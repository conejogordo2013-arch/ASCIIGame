<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ASCII Game Full Port</title>
<style>body{margin:0;background:#000;color:#ddd;font-family:monospace}#top{display:flex;gap:8px;flex-wrap:wrap;padding:8px;border-bottom:1px solid #333}.box{border:1px solid #444;padding:6px}button,input{font-family:monospace}#scr{white-space:pre;line-height:1;font-size:14px;padding:8px;min-height:78vh}.touch{position:fixed;right:8px;bottom:8px;display:grid;grid-template-columns:56px 56px 56px;gap:6px}.touch button{height:48px}</style></head><body>
<div id="top">
<div class="box"><b>Modo</b><br><button id="menuHistory">History</button><button id="menuBuilder">Builder</button><button id="restart">Restart</button></div>
<div class="box"><b>Builder Detallado</b><br>Runner <input id="bRunner" type="number" value="8" min="0" max="120" style="width:54px"> hp <input id="bRunnerHp" type="number" value="2" min="1" max="9" style="width:54px"> spd <input id="bRunnerSpd" type="number" value="8" min="1" max="60" style="width:54px"><br>
Rand <input id="bRand" type="number" value="6" min="0" max="120" style="width:54px"> hp <input id="bRandHp" type="number" value="2" min="1" max="9" style="width:54px"> spd <input id="bRandSpd" type="number" value="11" min="1" max="60" style="width:54px"> rng <input id="bRandRng" type="number" value="7" min="2" max="20" style="width:54px"><br>
CanH <input id="bCanH" type="number" value="6" min="0" max="120" style="width:54px"> spd <input id="bCanHSpd" type="number" value="17" min="1" max="90" style="width:54px"> CanV <input id="bCanV" type="number" value="6" min="0" max="120" style="width:54px"> spd <input id="bCanVSpd" type="number" value="19" min="1" max="90" style="width:54px"><br>
Pick + <input id="bLife" type="number" value="6" min="0" max="50" style="width:54px"> ammo <input id="bAmmo" type="number" value="8" min="0" max="50" style="width:54px"> walls% <input id="bWalls" type="number" value="12" min="0" max="40" style="width:54px"></div>
<div class="box" id="hud"></div>
</div>
<pre id="scr"></pre>
<div class="touch"><button data-k="w">↑</button><button data-k="m">●</button><button data-k="r">R</button><button data-k="a">←</button><button data-k="s">↓</button><button data-k="d">→</button></div>
<script>
const W=110,H=40, FPS=16;
let mode='history',frame=0,ended=false,msg='';
let world=[],player,enemies=[],cannons=[],bullets=[],pickups=[],checkpoints=[];
const scr=q('scr'),hud=q('hud'); function q(id){return document.getElementById(id)}
function mk(){world=Array.from({length:H},(_,y)=>Array.from({length:W},(_,x)=>(x===0||y===0||x===W-1||y===H-1)?'#':' '));}
function putRect(x1,y1,x2,y2,ch='#'){for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++) if(inb(x,y)) world[y][x]=ch;}
function inb(x,y){return x>=0&&y>=0&&x<W&&y<H}
function free(x,y){return inb(x,y)&&world[y][x]===' '}
function rEmpty(){for(let i=0;i<9000;i++){let x=1+Math.floor(Math.random()*(W-2)),y=1+Math.floor(Math.random()*(H-2));if(free(x,y)) return {x,y}} return {x:2,y:2}}
function historyMap(){putRect(10,33,80,33);putRect(20,25,100,25);putRect(5,18,90,18);putRect(26,11,90,11);putRect(35,5,105,5); for(let y=20;y<36;y++)world[y][65]='#'; checkpoints=[{x:56,y:22},{x:4,y:23},{x:33,y:11},{x:42,y:12},{x:85,y:15}];}
function builderMap(){const p=+q('bWalls').value; for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++) if(Math.random()*100<p) world[y][x]='#'; for(let i=0;i<8;i++){const y=5+i*4; for(let x=5;x<W-5;x++) if(x%9) world[y][x]='#'; }}
function spawn(){player={x:2,y:35,hp:3,ammo:15,dir:'d',cp:0};
if(mode==='history'){for(let i=0;i<8;i++) addEnemy('runner',2); for(let i=0;i<6;i++) addEnemy('random',2); for(let i=0;i<6;i++) addCannon('h',17); for(let i=0;i<6;i++) addCannon('v',19); addPickups(8,10)}
else{for(let i=0;i<+q('bRunner').value;i++) addEnemy('runner',+q('bRunnerHp').value,+q('bRunnerSpd').value); for(let i=0;i<+q('bRand').value;i++) addEnemy('random',+q('bRandHp').value,+q('bRandSpd').value,+q('bRandRng').value); for(let i=0;i<+q('bCanH').value;i++) addCannon('h',+q('bCanHSpd').value); for(let i=0;i<+q('bCanV').value;i++) addCannon('v',+q('bCanVSpd').value); addPickups(+q('bLife').value,+q('bAmmo').value)}
}
function addEnemy(kind,hp,spd=10,rng=7){const p=rEmpty(); enemies.push({kind,x:p.x,y:p.y,hp,spd,dir:['w','a','s','d'][Math.floor(Math.random()*4)],rng,ox:p.x,oy:p.y});}
function addCannon(kind,spd){const p=rEmpty(); cannons.push({kind,x:p.x,y:p.y,spd,dir:kind==='h'?(Math.random()<.5?'a':'d'):(Math.random()<.5?'w':'s')});}
function addPickups(life,ammo){for(let i=0;i<life;i++){const p=rEmpty();pickups.push({x:p.x,y:p.y,t:'+'});}for(let i=0;i<ammo;i++){const p=rEmpty();pickups.push({x:p.x,y:p.y,t:'A'});}for(const c of checkpoints){pickups.push({x:c.x,y:c.y,t:'C'});} }
function reset(){ended=false;msg='';frame=0;enemies=[];cannons=[];bullets=[];pickups=[];checkpoints=[];mk(); mode==='history'?historyMap():builderMap(); spawn(); render();}
function stepPos(x,y,d){if(d==='w')y--;if(d==='s')y++;if(d==='a')x--;if(d==='d')x++;return{x,y}}
function blocked(x,y){return !inb(x,y)||world[y][x]==='#'}
function hurt(){player.hp--; if(player.hp<=0){ended=true;msg='GAME OVER';return;} player.x=2;player.y=35;}
function tick(){if(ended)return; frame++;
for(const c of cannons) if(frame%c.spd===0) bullets.push({x:c.x,y:c.y,d:c.dir,from:'e'});
for(const e of enemies){ if(frame%e.spd!==0) continue; if(e.kind==='runner'){let m=stepPos(e.x,e.y,e.dir); if(blocked(m.x,m.y)){e.dir=e.dir==='a'?'d':e.dir==='d'?'a':e.dir==='w'?'s':'w';} else {e.x=m.x;e.y=m.y;}}
else{let dirs=['w','a','s','d']; if(Math.random()<0.7) dirs=[e.dir,...dirs]; for(const d of dirs){let m=stepPos(e.x,e.y,d); if(!blocked(m.x,m.y)&&Math.abs(m.x-e.ox)<=e.rng&&Math.abs(m.y-e.oy)<=e.rng){e.dir=d;e.x=m.x;e.y=m.y;break;}}}
if(e.x===player.x&&e.y===player.y) hurt();}
for(const b of bullets){let m=stepPos(b.x,b.y,b.d);b.x=m.x;b.y=m.y;}
bullets=bullets.filter(b=>inb(b.x,b.y)&&!blocked(b.x,b.y));
for(const b of bullets){if(b.from==='e'&&b.x===player.x&&b.y===player.y){b.x=-9;hurt();}}
for(const b of bullets) if(b.from==='p') for(const e of enemies) if(e.hp>0&&b.x===e.x&&b.y===e.y){e.hp--;b.x=-9;}
enemies=enemies.filter(e=>e.hp>0); bullets=bullets.filter(b=>b.x>=0);
for(const p of pickups) if(p.x===player.x&&p.y===player.y){ if(p.t==='+') player.hp=Math.min(9,player.hp+1); if(p.t==='A') player.ammo+=5; if(p.t==='C'){player.cp++; msg='CHECKPOINT';} p.x=-1; }
pickups=pickups.filter(p=>p.x>=0);
if(enemies.length===0){ended=true;msg='YOU WON';}
render();}
function render(){const g=world.map(r=>r.slice()); for(const p of pickups) if(inb(p.x,p.y)) g[p.y][p.x]=p.t; for(const c of cannons) g[c.y][c.x]=c.kind==='h'?'-':'|'; for(const e of enemies) g[e.y][e.x]=e.kind==='runner'?'S':'%'; for(const b of bullets) if(inb(b.x,b.y)) g[b.y][b.x]='o'; g[player.y][player.x]='X';
let legend=['','LEGEND','X YOU','S runner','% randomer','- | cannons','A ammo +5','+ life +1','C checkpoint','','ESC no usado web','R restart','M shoot']; for(let i=0;i<legend.length;i++){const y=1+i,x=W-23; for(let j=0;j<legend[i].length;j++) if(inb(x+j,y)) g[y][x+j]=legend[i][j];}
let txt=g.map(r=>r.join('')).join('\n'); if(ended) txt+='\n\n'+msg; if(msg&&!ended&&frame%40===0) msg=''; scr.textContent=txt; hud.textContent=`HP ${player.hp} | Ammo ${player.ammo} | Enemigos ${enemies.length} | Frame ${frame} | Mode ${mode}`;}
function act(k){if(k==='r'){reset();return;} if(ended)return; if('wasd'.includes(k)){player.dir=k;let m=stepPos(player.x,player.y,k); if(!blocked(m.x,m.y)){player.x=m.x;player.y=m.y;}} if(k==='m'&&player.ammo>0){player.ammo--; bullets.push({x:player.x,y:player.y,d:player.dir,from:'p'});} render();}
addEventListener('keydown',e=>{const k=e.key.toLowerCase(); if(['w','a','s','d','m','r'].includes(k)){e.preventDefault();act(k);}});
document.querySelectorAll('.touch button').forEach(b=>b.onclick=()=>act(b.dataset.k));
q('menuHistory').onclick=()=>{mode='history';reset()}; q('menuBuilder').onclick=()=>{mode='builder';reset()}; q('restart').onclick=reset;
setInterval(tick,1000/FPS); reset();
</script></body></html>
